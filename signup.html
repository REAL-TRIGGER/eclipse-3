<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Sign Up</title>

  <style>
    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .box {
      background: #11141b;
      padding: 30px;
      width: 380px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #a0a4b8;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #1a1e27;
      color: white;
    }

    .row input {
      width: 100%;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #4255ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #5f72ff;
    }

    .link-btn {
      margin-top: 10px;
      background: transparent;
      border: none;
      color: #a0a4ff;
      cursor: pointer;
      font-size: 13px;
      text-decoration: underline;
    }

    #error {
      color: #ff4b4b;
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
    }

    #success {
      color: #4bff8a;
      margin-top: 6px;
      min-height: 18px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">Create your Eclipse account</div>
    <div class="subtitle">Just a few details to get started.</div>

    <div class="row">
      <input id="firstName" type="text" placeholder="First name">
      <input id="lastName" type="text" placeholder="Last name">
    </div>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signUp()">Sign Up</button>
    <button class="link-btn" onclick="goToSignIn()">Already have an account? Sign in</button>

    <p id="error"></p>
    <p id="success"></p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const client = createClient(
      "https://fjkybogixlqecziuxfui.supabase.co",
      "sb_publishable_SjaaZzJG2Q7SLPSQD3hKOg_9h-BNCk_"
    );

    window.signUp = async () => {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");
      errorEl.innerText = "";
      successEl.innerText = "";

      if (!firstName || !lastName) {
        errorEl.innerText = "Please enter your first and last name.";
        return;
      }

      try {
        const { error } = await client.auth.signUp({
          email,
          password,
          options: {
            data: {
              first_name: firstName,
              last_name: lastName
            }
          }
        });

        if (error) throw error;

        successEl.innerText = "Account created! You can now sign in.";
      } catch (err) {
        errorEl.innerText = err.message || "Sign up failed.";
      }
    };

    window.goToSignIn = () => {
      window.location.href = "signin.html";
    };
  </script>
</body>
</html>
