<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eclipse 3.0 – Sign In</title>

  <style>
    body {
      margin: 0;
      background: #0d0f14;
      font-family: Arial, sans-serif;
      color: white;
    }

    .wrapper {
      display: flex;
      min-height: 100vh;
    }

    .left, .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left {
      background: #0d0f14;
      border-right: 1px solid #1a1e27;
    }

    .right {
      background: #11141b;
    }

    .box {
      background: #11141b;
      padding: 30px;
      width: 350px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #a0a4b8;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      background: #1a1e27;
      color: white;
    }

    button {
      width: 95%;
      padding: 12px;
      background: #4255ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #5f72ff;
    }

    #error {
      color: #ff4b4b;
      margin-top: 10px;
      min-height: 18px;
      font-size: 13px;
    }

    .right-content {
      max-width: 350px;
      text-align: left;
    }

    .right-title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .right-text {
      font-size: 14px;
      color: #b0b4c8;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .outline-btn {
      width: auto;
      padding: 10px 20px;
      background: transparent;
      border-radius: 6px;
      border: 1px solid #4255ff;
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
    }

    .outline-btn:hover {
      background: #4255ff33;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <!-- LEFT: SIGN IN -->
    <div class="left">
      <div class="box">
        <div class="title">Eclipse 3.0</div>
        <div class="subtitle">Sign in to access your dashboard</div>

        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button onclick="signIn()">Sign In</button>

        <p id="error"></p>
      </div>
    </div>

    <!-- RIGHT: NEW TO ECLIPSE -->
    <div class="right">
      <div class="right-content">
        <div class="right-title">New to Eclipse?</div>
        <p class="right-text">
          Create your Eclipse account to unlock your dashboard, AI tools, and future features.
        </p>
        <button class="outline-btn" onclick="goToSignUp()">Sign up here</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const client = createClient(
      "https://fjkybogixlqecziuxfui.supabase.co",
      "sb_publishable_SjaaZzJG2Q7SLPSQD3hKOg_9h-BNCk_"
    );

    window.signIn = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const errorEl = document.getElementById("error");
      errorEl.innerText = "";

      try {
        const { error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;

        window.location.href = "dashboard/index.html";
      } catch (err) {
        errorEl.innerText = err.message || "Sign in failed.";
      }
    };

    window.goToSignUp = () => {
      window.location.href = "signup.html";
    };
  </script>
</body>
</html>
